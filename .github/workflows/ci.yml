name: CI

on:
  push:
    branches: [main, custom-funtionalities]
  pull_request:
    branches: [main]

jobs:
  test-sqlite:
    name: test (SQLite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install drf-spectacular daphne

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: python manage.py check

      - name: Check migrations are up to date
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: python manage.py test

  test-mysql:
    name: test (MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_todo_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install drf-spectacular daphne

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings_ci_mysql
          MYSQL_DATABASE: test_todo_db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
        run: python manage.py check

      - name: Apply migrations on MySQL
        env:
          DJANGO_SETTINGS_MODULE: config.settings_ci_mysql
          MYSQL_DATABASE: test_todo_db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
        run: python manage.py migrate --noinput

      - name: Check migrations are up to date
        env:
          DJANGO_SETTINGS_MODULE: config.settings_ci_mysql
          MYSQL_DATABASE: test_todo_db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests on MySQL
        env:
          DJANGO_SETTINGS_MODULE: config.settings_ci_mysql
          MYSQL_DATABASE: test_todo_db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
        run: python manage.py test
