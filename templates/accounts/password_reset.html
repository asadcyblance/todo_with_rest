{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Todo Management</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-2">Forgot Password</h3>
                    <p class="text-muted text-center small mb-4">
                        Enter the email address linked to your login account.
                    </p>

                    {% if form.email.errors %}
                        <div class="alert alert-danger" role="alert">
                            {% for error in form.email.errors %}
                                {{ error }}
                            {% endfor %}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label" for="id_email">Email address</label>
                            {{ form.email }}
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            Send Reset Link
                        </button>

                        <div class="text-center">
                            <a href="{% url 'login' %}" class="small">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
